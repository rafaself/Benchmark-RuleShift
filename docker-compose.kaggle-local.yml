services:
  kaggle-local:
    build:
      context: .
      dockerfile: Dockerfile.kaggle-local
    working_dir: /workspace/ruleshift
    volumes:
      - .:/workspace/ruleshift
      - kaggle-local-pip-cache:/root/.cache/pip
    entrypoint:
      - /bin/bash
      - /workspace/ruleshift/scripts/bootstrap_kaggle_local.sh
    command:
      - bash
    stdin_open: true
    tty: true

volumes:
  kaggle-local-pip-cache:
