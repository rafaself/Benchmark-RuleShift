name: Deploy — Kaggle Runtime Dataset

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - staging
          - production
      dataset_id:
        description: >
          Kaggle dataset id (owner/slug). Must match the canonical id baked
          into the build script. Providing a different value aborts the job
          before any upload occurs.
        required: true
        default: "raptorengineer/ruleshift-runtime"
      dataset_title:
        description: "Human-readable dataset title written into dataset-metadata.json"
        required: true
        default: "RuleShift Runtime"
      release_message:
        description: "Version note written to Kaggle on new-version uploads"
        required: true

# Only one deploy may run at a time; a queued run is cancelled, not queued,
# if a newer one arrives for the same environment.
concurrency:
  group: deploy-kaggle-dataset-${{ inputs.environment }}
  cancel-in-progress: false

env:
  KAGGLE_CLI_VERSION: "1.8.4"
  PACKAGE_DIR: /tmp/ruleshift-runtime-package
  # Canonical slug baked into build_runtime_dataset_package.py.
  # The input is validated against this value; it is never allowed to diverge.
  CANONICAL_DATASET_ID: "raptorengineer/ruleshift-runtime"

jobs:
  # ── Job 1: validate ──────────────────────────────────────────────────────────
  # Runs the same validation gates used in CI so that a deploy from an
  # un-merged branch cannot bypass them.
  validate:
    name: Validate (${{ inputs.environment }})
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Install project (editable, no optional provider SDKs)
        run: pip install -e .

      - name: Install notebook smoke-test dependencies
        run: pip install "pandas>=2.0,<3.0"

      - name: Enforce private split isolation
        run: python scripts/check_public_private_isolation.py

      - name: Run packaging tests
        run: python -m pytest tests/test_packaging.py -v

      - name: Run CD build validation tests
        run: python -m pytest tests/test_cd_build.py -v

  # ── Job 2: deploy ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy dataset (${{ inputs.environment }})
    runs-on: ubuntu-latest
    needs: validate
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project (editable, no optional provider SDKs)
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Install Kaggle CLI (pinned)
        run: pip install "kaggle==${{ env.KAGGLE_CLI_VERSION }}"

      # ── Guard: dataset id must equal the canonical value ─────────────────────
      # Prevents a mistyped input from creating a second dataset under a new slug.
      - name: Verify dataset_id matches canonical value
        run: |
          if [ "${{ inputs.dataset_id }}" != "${{ env.CANONICAL_DATASET_ID }}" ]; then
            echo "ERROR: dataset_id '${{ inputs.dataset_id }}' does not match" \
                 "canonical id '${{ env.CANONICAL_DATASET_ID }}'."
            echo "The dataset id must remain stable across releases."
            echo "To publish under a new slug, update CANONICAL_DATASET_ID in the workflow"
            echo "and the matching constant in scripts/cd/build_runtime_dataset_package.py"
            echo "in the same commit."
            exit 1
          fi

      # ── Build ─────────────────────────────────────────────────────────────────
      - name: Build runtime dataset package
        run: |
          python scripts/cd/build_runtime_dataset_package.py \
            --output-dir "${{ env.PACKAGE_DIR }}"

      # Overwrite dataset-metadata.json with the caller-supplied title while
      # keeping the id locked to the canonical value.  The build script already
      # wrote the correct id; this step only updates the title field.
      - name: Patch dataset-metadata.json title
        run: |
          python - <<'EOF'
          import json
          from pathlib import Path

          meta_path = Path("${{ env.PACKAGE_DIR }}") / "dataset-metadata.json"
          meta = json.loads(meta_path.read_text(encoding="utf-8"))
          meta["title"] = "${{ inputs.dataset_title }}"
          meta_path.write_text(json.dumps(meta, indent=2) + "\n", encoding="utf-8")
          print(f"dataset-metadata.json: id={meta['id']!r}  title={meta['title']!r}")
          EOF

      # ── Publish ───────────────────────────────────────────────────────────────
      # Use `kaggle datasets status` to decide create vs version.
      # The command exits non-zero when the dataset does not yet exist.
      - name: Configure Kaggle credentials
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          mkdir -p ~/.kaggle
          echo "$KAGGLE_API_TOKEN" > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json

      - name: Publish dataset (create or new version)
        run: |
          if kaggle datasets status "${{ inputs.dataset_id }}" >/dev/null 2>&1; then
            echo "Dataset exists — creating new version."
            kaggle datasets version \
              --path "${{ env.PACKAGE_DIR }}" \
              --message "${{ inputs.release_message }}" \
              --dir-mode tar \
              --quiet
          else
            echo "Dataset not found — creating for the first time."
            kaggle datasets create \
              --path "${{ env.PACKAGE_DIR }}" \
              --dir-mode tar \
              --quiet
          fi

      - name: Revoke Kaggle credentials
        if: always()
        run: rm -f ~/.kaggle/kaggle.json
