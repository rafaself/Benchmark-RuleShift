name: Deploy - Kaggle Runtime Dataset

on:
  workflow_dispatch:
    inputs:
      release_message:
        description: "Version note written to Kaggle on new-version uploads"
        required: true

permissions:
  contents: read

concurrency:
  group: deploy-kaggle-dataset
  cancel-in-progress: false

env:
  KAGGLE_CLI_VERSION: "2.0.0"
  PACKAGE_DIR: /tmp/ruleshift-runtime-package

jobs:
  deploy:
    name: Deploy dataset
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955

      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .
          pip install "kaggle==${KAGGLE_CLI_VERSION}"

      - name: Build runtime dataset package
        run: |
          python scripts/build_runtime_dataset_package.py \
            --output-dir "$PACKAGE_DIR"

      - name: Validate runtime dataset artifact
        run: python -m pytest tests/test_cd_build.py tests/test_packaging.py -v

      - name: Publish dataset
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
          RELEASE_MESSAGE: ${{ inputs.release_message }}
        run: |
          set -euo pipefail

          DATASET_ID=$(python -c "import json; print(json.load(open('packaging/kaggle/dataset-metadata.json'))['id'])")

          status_file="$(mktemp)"
          trap 'rm -f "$status_file"' EXIT

          kaggle --version

          if kaggle datasets status "$DATASET_ID" >"$status_file" 2>&1; then
            kaggle datasets version \
              --path "$PACKAGE_DIR" \
              --message "$RELEASE_MESSAGE" \
              --dir-mode tar \
              --quiet
            exit 0
          fi

          status_output="$(cat "$status_file")"

          if printf '%s' "$status_output" | grep -Eqi '401|403|unauth|forbidden|auth|login|token|credential|permission|access denied'; then
            echo "ERROR: Kaggle authentication/authorization failed while checking dataset status."
            printf '%s\n' "$status_output"
            exit 1
          fi

          if printf '%s' "$status_output" | grep -Eqi '404|not found|does not exist|could not find'; then
            kaggle datasets create \
              --path "$PACKAGE_DIR" \
              --dir-mode tar \
              --quiet
            exit 0
          fi

          echo "ERROR: Unable to determine dataset status from Kaggle CLI output."
          printf '%s\n' "$status_output"
          exit 1
