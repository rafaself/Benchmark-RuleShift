name: Deploy — Kaggle Runtime Dataset

on:
  workflow_dispatch:
    inputs:
      dataset_id:
        description: >
          Kaggle dataset id (owner/slug). Must match the canonical id in
          packaging/kaggle/dataset-metadata.json. Providing a different value
          aborts the job before any upload occurs.
        required: true
        default: "KAGGLE_USERNAME/ruleshift-runtime"
      release_message:
        description: "Version note written to Kaggle on new-version uploads"
        required: true

  # Called by the orchestrator workflow.
  workflow_call:
    inputs:
      dataset_id:
        description: "Kaggle dataset id (owner/slug)"
        required: true
        type: string
      release_message:
        description: "Version note for the new dataset version"
        required: true
        type: string
    secrets:
      KAGGLE_API_TOKEN:
        required: true

# Only one deploy may run at a time; a queued run is cancelled, not queued,
# if a newer one arrives for the same environment.
concurrency:
  group: deploy-kaggle-dataset
  cancel-in-progress: false

env:
  KAGGLE_CLI_VERSION: "2.0.0"
  PACKAGE_DIR: /tmp/ruleshift-runtime-package
  # Canonical slug baked into build_runtime_dataset_package.py.
  # The input is validated against this value; it is never allowed to diverge.
  CANONICAL_DATASET_ID: "${{ vars.KAGGLE_USERNAME }}/ruleshift-runtime"

jobs:
  # ── Job 1: validate ──────────────────────────────────────────────────────────
  # Runs the same validation gates used in CI so that a deploy from an
  # un-merged branch cannot bypass them.
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Install project (editable, no optional provider SDKs)
        run: pip install -e .

      - name: Install notebook smoke-test dependencies
        run: pip install "pandas>=2.0,<3.0"

      - name: Enforce private split isolation
        run: python scripts/check_public_private_isolation.py

      - name: Run packaging tests
        run: python -m pytest tests/test_packaging.py -v

      - name: Run CD build validation tests
        run: python -m pytest tests/test_cd_build.py -v

  # ── Job 2: deploy ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy dataset
    runs-on: ubuntu-latest
    needs: validate
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project (editable, no optional provider SDKs)
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Install Kaggle CLI (pinned)
        run: pip install "kaggle==${KAGGLE_CLI_VERSION}"

      # ── Guard: dataset id must equal the canonical value ─────────────────────
      # Prevents a mistyped input from creating a second dataset under a new slug.
      - name: Verify dataset_id matches canonical value
        env:
          DATASET_ID: ${{ inputs.dataset_id }}
        run: |
          if [ "$DATASET_ID" != "$CANONICAL_DATASET_ID" ]; then
            echo "ERROR: dataset_id does not match canonical id."
            echo "The dataset id must remain stable across releases."
            exit 1
          fi

      # ── Build ─────────────────────────────────────────────────────────────────
      - name: Build runtime dataset package
        run: |
          python scripts/cd/build_runtime_dataset_package.py \
            --output-dir "$PACKAGE_DIR"

      # ── Publish ───────────────────────────────────────────────────────────────
      # Authenticate with the recommended API token flow. The Kaggle CLI
      # accepts KAGGLE_API_TOKEN directly, so CI does not need kaggle.json.
      - name: Verify Kaggle CLI installation and authentication
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          set -euo pipefail

          output_file="$(mktemp)"
          trap 'rm -f "$output_file"' EXIT

          kaggle --version

          if kaggle datasets list -m >"$output_file" 2>&1; then
            echo "Kaggle CLI authentication preflight passed."
            exit 0
          fi

          output="$(cat "$output_file")"
          echo "ERROR: Kaggle CLI authentication preflight failed."
          if printf '%s' "$output" | grep -Eqi '401|403|unauth|forbidden|auth|login|token|credential|permission|access denied'; then
            echo "KAGGLE_API_TOKEN was rejected or lacks the required permissions."
          else
            echo "The Kaggle CLI could not complete an authenticated request."
          fi
          printf '%s\n' "$output"
          exit 1

      - name: Publish dataset (create or new version)
        env:
          DATASET_ID: ${{ inputs.dataset_id }}
          RELEASE_MESSAGE: ${{ inputs.release_message }}
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          set -euo pipefail

          status_file="$(mktemp)"
          trap 'rm -f "$status_file"' EXIT

          if kaggle datasets status "$DATASET_ID" >"$status_file" 2>&1; then
            echo "Dataset exists — creating new version."
            kaggle datasets version \
              --path "$PACKAGE_DIR" \
              --message "$RELEASE_MESSAGE" \
              --dir-mode tar \
              --quiet
          else
            status_output="$(cat "$status_file")"

            if printf '%s' "$status_output" | grep -Eqi '401|403|unauth|forbidden|auth|login|token|credential|permission|access denied'; then
              echo "ERROR: Kaggle authentication/authorization failed while checking dataset status."
              printf '%s\n' "$status_output"
              exit 1
            fi

            if printf '%s' "$status_output" | grep -Eqi '404|not found|does not exist|could not find'; then
              echo "Dataset not found — creating for the first time."
              kaggle datasets create \
                --path "$PACKAGE_DIR" \
                --dir-mode tar \
                --quiet
            else
              echo "ERROR: Unable to determine dataset status from Kaggle CLI output."
              printf '%s\n' "$status_output"
              exit 1
            fi
          fi
