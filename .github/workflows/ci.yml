name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ── Job 1: validate ──────────────────────────────────────────────────────────
  # Installs the project, runs the full test suite, and checks all canonical
  # validation commands.  This job is the source-of-truth gate: it must pass
  # before any deploy artifacts are produced.
  validate:
    name: Validate (Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Install project (editable, no optional provider SDKs)
        run: pip install -e .

      # pandas is needed only by the kbench notebook smoke tests
      - name: Install notebook smoke-test dependencies
        run: pip install "pandas>=2.0,<3.0"

      # ── packaging contract ───────────────────────────────────────────────────
      # Validates kernel-metadata.json, frozen_artifacts_manifest.json,
      # split manifests, active-docs consistency, and packaging text contracts.
      - name: Run packaging tests
        run: python -m pytest tests/test_packaging.py -v

      # ── notebook smoke tests ─────────────────────────────────────────────────
      # Validates the official Kaggle notebook's bootstrap, imports, task
      # registration, dry-run evaluation, and scoring contract — using the
      # kbench shim instead of real Kaggle infrastructure.
      - name: Run notebook smoke tests  (make notebook-check)
        run: python -m pytest tests/test_kbench_notebook.py -v

      # ── full unit/integration test suite ────────────────────────────────────
      # Runs all tests except the live-LLM provider panels that require API keys.
      - name: Run full test suite
        run: |
          python -m pytest tests/ -v \
            --ignore=tests/test_gemini_provider.py \
            --ignore=tests/test_anthropic_provider.py \
            --ignore=tests/test_openai_provider.py \
            --ignore=tests/test_gemini_panel.py \
            --ignore=tests/test_anthropic_panel.py \
            --ignore=tests/test_openai_panel.py

      # ── canonical validation commands ───────────────────────────────────────
      # These mirror `make validity`, `make integrity`, and `make evidence-pass`.
      # They call the same CLI entry points used locally.
      - name: Validate anti-shortcut validity gate
        run: python scripts/ruleshift_benchmark.py validity

      - name: Validate split integrity
        run: python scripts/ruleshift_benchmark.py integrity

      - name: Validate evidence pass
        run: python scripts/ruleshift_benchmark.py evidence-pass

  # ── Job 2: build-deploy ──────────────────────────────────────────────────────
  # Generates fresh deploy artifacts from the canonical repo state and uploads
  # them as GitHub Actions artifacts.  Never touches Kaggle.
  build-deploy:
    name: Build deploy artifacts
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build deploy artifacts from repo
        run: python scripts/build_deploy.py

      - name: Verify deploy/kaggle-notebook/ was produced
        run: |
          test -f deploy/kaggle-notebook/ruleshift_benchmark_v1_kbench.ipynb \
            || (echo "ERROR: deploy/kaggle-notebook/ not built" && exit 1)

      - name: Verify deploy/kaggle-runtime/ was produced
        run: |
          test -f deploy/kaggle-runtime/dataset-metadata.json \
            || (echo "ERROR: deploy/kaggle-runtime/ not built" && exit 1)
          test -f deploy/kaggle-runtime/packaging/kaggle/frozen_artifacts_manifest.json \
            || (echo "ERROR: deploy/kaggle-runtime/packaging/kaggle/frozen_artifacts_manifest.json missing" && exit 1)
          test -d deploy/kaggle-runtime/src/frozen_splits \
            || (echo "ERROR: deploy/kaggle-runtime/src/frozen_splits/ missing" && exit 1)

      - name: Upload kaggle-notebook artifact
        uses: actions/upload-artifact@v4
        with:
          name: kaggle-notebook
          path: deploy/kaggle-notebook/
          if-no-files-found: error

      - name: Upload kaggle-runtime artifact
        uses: actions/upload-artifact@v4
        with:
          name: kaggle-runtime
          path: deploy/kaggle-runtime/
          if-no-files-found: error
