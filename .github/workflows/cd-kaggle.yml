name: CD — Kaggle Publish

on:
  workflow_dispatch:
    inputs:
      dataset_version_message:
        description: 'Dataset version message (defaults to commit SHA)'
        required: false
        type: string
        default: ""

permissions:
  contents: read

concurrency:
  group: kaggle-publish
  cancel-in-progress: false

jobs:
  preflight-build:
    name: Preflight and build deploy artifacts
    runs-on: ubuntu-latest
    outputs:
      dataset_id: ${{ steps.capture.outputs.dataset_id }}
      kernel_id: ${{ steps.capture.outputs.kernel_id }}
      notebook_file: ${{ steps.capture.outputs.notebook_file }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .
          pip install "pandas>=2.0,<3.0"
          pip install "kaggle>=1.7.4.5"

      - name: Check Kaggle token is configured
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          test -n "$KAGGLE_API_TOKEN" || { echo "ERROR: KAGGLE_API_TOKEN secret is not set" >&2; exit 1; }
          echo "Kaggle token present."

      - name: Validate packaging contract
        run: python -m pytest tests/test_packaging.py -v

      - name: Validate notebook contract
        run: python -m pytest tests/test_kbench_notebook.py -v

      - name: Build deploy artifacts
        run: python scripts/build_deploy.py

      - name: Verify deploy artifacts exist
        run: |
          test -f deploy/kaggle-notebook/ruleshift_benchmark_v1_kbench.ipynb \
            || { echo "ERROR: notebook artifact missing" >&2; exit 1; }
          test -f deploy/kaggle-runtime/dataset-metadata.json \
            || { echo "ERROR: dataset-metadata.json missing" >&2; exit 1; }
          test -f deploy/kaggle-runtime/packaging/kaggle/frozen_artifacts_manifest.json \
            || { echo "ERROR: frozen_artifacts_manifest.json missing" >&2; exit 1; }
          test -d deploy/kaggle-runtime/src/frozen_splits \
            || { echo "ERROR: frozen_splits/ missing" >&2; exit 1; }

      - name: Validate canonical metadata IDs
        run: |
          python - <<'PY'
          import json
          import sys
          from pathlib import Path

          errors = []

          dataset_path = Path("deploy/kaggle-runtime/dataset-metadata.json")
          notebook_path = Path("deploy/kaggle-notebook/kernel-metadata.json")

          dataset_meta = json.loads(dataset_path.read_text())
          kernel_meta = json.loads(notebook_path.read_text())

          dataset_id = dataset_meta.get("id", "")
          kernel_id = kernel_meta.get("id", "")

          if "/" not in dataset_id:
              errors.append(
                  "dataset-metadata.json must contain a fully-qualified Kaggle dataset id "
                  "(for example: 'owner-slug/dataset-slug')."
              )

          if "/" not in kernel_id:
              errors.append(
                  "deploy/kaggle-notebook/kernel-metadata.json must contain a fully-qualified Kaggle kernel id "
                  "(for example: 'owner-slug/kernel-slug')."
              )

          placeholders = ("YOUR_USERNAME", "<username>", "owner-slug")
          for marker in placeholders:
              if marker in dataset_id:
                  errors.append(f"dataset id still contains placeholder: {dataset_id!r}")
              if marker in kernel_id:
                  errors.append(f"kernel id still contains placeholder: {kernel_id!r}")

          if not kernel_meta.get("code_file"):
              errors.append("kernel-metadata.json missing 'code_file'")

          if errors:
              print("Canonical metadata validation FAILED:", file=sys.stderr)
              for err in errors:
                  print(f"  - {err}", file=sys.stderr)
              sys.exit(1)

          print(f"dataset id: {dataset_id}")
          print(f"kernel id: {kernel_id}")
          print(f"code_file: {kernel_meta['code_file']}")
          print(f"dataset_sources: {kernel_meta.get('dataset_sources', [])}")
          PY

      - name: Validate publish-ready metadata
        run: |
          python - <<'PY'
          import json
          import sys
          from pathlib import Path

          errors = []

          km = json.loads(Path("deploy/kaggle-notebook/kernel-metadata.json").read_text())
          dm = json.loads(Path("deploy/kaggle-runtime/dataset-metadata.json").read_text())

          expected_notebook = "ruleshift_benchmark_v1_kbench.ipynb"

          if km.get("kernel_type") != "notebook":
              errors.append(f"kernel_type={km.get('kernel_type')!r}, expected 'notebook'")

          if km.get("code_file") != expected_notebook:
              errors.append(f"code_file={km.get('code_file')!r}, expected {expected_notebook!r}")

          if "/" not in km.get("id", ""):
              errors.append(f"kernel id is not fully qualified: {km.get('id')!r}")

          if "/" not in dm.get("id", ""):
              errors.append(f"dataset id is not fully qualified: {dm.get('id')!r}")

          if not km.get("dataset_sources"):
              errors.append("dataset_sources is empty")

          for placeholder in ("YOUR_USERNAME", "<username>", "owner-slug"):
              if placeholder in dm.get("id", ""):
                  errors.append(f"dataset id still has placeholder: {dm.get('id')!r}")
              if placeholder in km.get("id", ""):
                  errors.append(f"kernel id still has placeholder: {km.get('id')!r}")

          for field in ("title", "id", "licenses"):
              if not dm.get(field):
                  errors.append(f"dataset-metadata.json missing {field!r}")

          ds = km.get("dataset_sources", [])
          if ds and dm.get("id") not in ds:
              errors.append(
                  f"kernel dataset_sources {ds!r} does not reference dataset id {dm.get('id')!r}"
              )

          notebook_path = Path("deploy/kaggle-notebook") / km["code_file"]
          if not notebook_path.exists():
              errors.append(f"notebook file missing: {notebook_path}")

          if errors:
              print("Metadata validation FAILED:", file=sys.stderr)
              for err in errors:
                  print(f"  - {err}", file=sys.stderr)
              sys.exit(1)

          print("Metadata validation passed.")
          PY

      - name: Capture metadata outputs
        id: capture
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          km = json.loads(Path("deploy/kaggle-notebook/kernel-metadata.json").read_text())
          dm = json.loads(Path("deploy/kaggle-runtime/dataset-metadata.json").read_text())
          out = Path(os.environ["GITHUB_OUTPUT"])

          with out.open("a") as f:
              print(f"dataset_id={dm['id']}", file=f)
              print(f"kernel_id={km['id']}", file=f)
              print(f"notebook_file={km['code_file']}", file=f)
          PY

      - name: Upload runtime artifact
        uses: actions/upload-artifact@v4
        with:
          name: kaggle-runtime
          path: deploy/kaggle-runtime
          if-no-files-found: error

      - name: Upload notebook artifact
        uses: actions/upload-artifact@v4
        with:
          name: kaggle-notebook
          path: deploy/kaggle-notebook
          if-no-files-found: error

      - name: Write preflight summary
        run: |
          {
            echo "## Kaggle preflight summary"
            echo ""
            echo "- Ref: \`${{ github.ref }}\`"
            echo "- Commit: \`${{ github.sha }}\`"
            echo "- Dataset target: \`${{ steps.capture.outputs.dataset_id }}\`"
            echo "- Notebook target: \`${{ steps.capture.outputs.kernel_id }}\`"
            echo "- Notebook file: \`${{ steps.capture.outputs.notebook_file }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  publish-dataset:
    name: Publish Kaggle dataset
    runs-on: ubuntu-latest
    needs: preflight-build
    environment: kaggle-prod

    steps:
      - name: Download runtime artifact
        uses: actions/download-artifact@v4
        with:
          name: kaggle-runtime
          path: deploy/kaggle-runtime

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Kaggle CLI
        run: |
          python -m pip install --upgrade pip
          pip install "kaggle>=1.7.4.5"

      - name: Check Kaggle token is configured
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          test -n "$KAGGLE_API_TOKEN" || { echo "ERROR: KAGGLE_API_TOKEN secret is not set" >&2; exit 1; }

      - name: Verify dataset publish payload
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          dm = json.loads(Path("deploy/kaggle-runtime/dataset-metadata.json").read_text())

          assert "/" in dm["id"], dm
          assert dm.get("title"), dm
          assert dm.get("licenses"), dm

          print("Dataset payload verified.")
          print(f"Dataset id: {dm['id']}")
          PY

      - name: Publish dataset to Kaggle
        id: publish_dataset
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
          DATASET_VERSION_MESSAGE: ${{ inputs.dataset_version_message }}
          DATASET_ID: ${{ needs.preflight-build.outputs.dataset_id }}
        run: |
          OWNER="${DATASET_ID%%/*}"
          SLUG="${DATASET_ID##*/}"
          VERSION_MSG="${DATASET_VERSION_MESSAGE:-Update from ${{ github.sha }}}"

          if kaggle datasets metadata -o "$OWNER" -d "$SLUG" -p /tmp/kaggle-meta-check 2>/dev/null; then
            echo "Dataset $DATASET_ID exists — publishing new version"
            kaggle datasets version -p deploy/kaggle-runtime -m "$VERSION_MSG"
            echo "mode=version" >> "$GITHUB_OUTPUT"
          else
            echo "Dataset $DATASET_ID not found — creating"
            kaggle datasets create -p deploy/kaggle-runtime
            echo "mode=create" >> "$GITHUB_OUTPUT"
          fi

      - name: Write dataset publish summary
        run: |
          {
            echo "## Dataset publish"
            echo ""
            echo "- Dataset: \`${{ needs.preflight-build.outputs.dataset_id }}\`"
            echo "- Mode: \`${{ steps.publish_dataset.outputs.mode }}\`"
            echo "- Ref: \`${{ github.ref }}\`"
            echo "- Commit: \`${{ github.sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  publish-notebook:
    name: Publish Kaggle notebook
    runs-on: ubuntu-latest
    needs:
      - preflight-build
      - publish-dataset
    environment: kaggle-prod

    steps:
      - name: Download notebook artifact
        uses: actions/download-artifact@v4
        with:
          name: kaggle-notebook
          path: deploy/kaggle-notebook

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Kaggle CLI
        run: |
          python -m pip install --upgrade pip
          pip install "kaggle>=1.7.4.5"

      - name: Check Kaggle token is configured
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          test -n "$KAGGLE_API_TOKEN" || { echo "ERROR: KAGGLE_API_TOKEN secret is not set" >&2; exit 1; }

      - name: Verify notebook publish payload
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          km = json.loads(Path("deploy/kaggle-notebook/kernel-metadata.json").read_text())
          notebook_path = Path("deploy/kaggle-notebook") / km["code_file"]

          assert km["kernel_type"] == "notebook", km
          assert "/" in km["id"], km
          assert notebook_path.exists(), notebook_path
          assert km.get("dataset_sources"), km

          print("Notebook payload verified.")
          print(f"Kernel id: {km['id']}")
          print(f"Code file: {km['code_file']}")
          print(f"Dataset sources: {km['dataset_sources']}")
          PY

      - name: Publish notebook to Kaggle
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          echo "Pushing notebook ${{ needs.preflight-build.outputs.kernel_id }}"
          kaggle kernels push -p deploy/kaggle-notebook

      - name: Write notebook publish summary
        run: |
          {
            echo "## Notebook publish"
            echo ""
            echo "- Notebook: \`${{ needs.preflight-build.outputs.kernel_id }}\`"
            echo "- Notebook file: \`${{ needs.preflight-build.outputs.notebook_file }}\`"
            echo "- Runtime dataset: \`${{ needs.preflight-build.outputs.dataset_id }}\`"
            echo "- Triggered by: \`${{ github.actor }}\`"
          } >> "$GITHUB_STEP_SUMMARY"