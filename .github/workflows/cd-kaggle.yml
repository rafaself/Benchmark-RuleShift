name: CD — Kaggle Publish

on:
  workflow_dispatch:
    inputs:
      dataset_version_message:
        description: "Dataset version message (defaults to commit SHA)"
        required: false
        type: string
        default: ""

permissions:
  contents: read

concurrency:
  group: kaggle-publish
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.11"
  KAGGLE_CLI_VERSION: "1.7.4.5"
  KAGGLE_DATASET_DIR_MODE: "zip"
  DEPLOY_RUNTIME_DIR: "deploy/kaggle-runtime"
  DEPLOY_NOTEBOOK_DIR: "deploy/kaggle-notebook"
  EXPECTED_NOTEBOOK_FILE: "ruleshift_benchmark_v1_kbench.ipynb"

defaults:
  run:
    shell: bash

jobs:
  preflight-build:
    name: Preflight and build deploy artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 25
    outputs:
      dataset_id: ${{ steps.capture.outputs.dataset_id }}
      kernel_id: ${{ steps.capture.outputs.kernel_id }}
      notebook_file: ${{ steps.capture.outputs.notebook_file }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install -e .
          python -m pip install "pandas>=2.0,<3.0" "kaggle==${KAGGLE_CLI_VERSION}"

      - name: Kaggle auth smoke test
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          set -euo pipefail
          test -n "${KAGGLE_API_TOKEN}" || {
            echo "ERROR: KAGGLE_API_TOKEN secret is not set" >&2
            exit 1
          }
          python -c "
          from kaggle.api.kaggle_api_extended import KaggleApiExtended as KaggleApi
          api = KaggleApi()
          api.authenticate()
          print('Kaggle env-based auth OK')
          "

      - name: Validate packaging contract
        run: python -m pytest tests/test_packaging.py -v

      - name: Validate notebook contract
        run: python -m pytest tests/test_kbench_notebook.py -v

      - name: Build deploy artifacts
        run: python scripts/build_deploy.py

      - name: Remove transient files from deploy artifacts
        run: bash scripts/cd/clean_deploy_artifacts.sh "${DEPLOY_RUNTIME_DIR}" "${DEPLOY_NOTEBOOK_DIR}"

      - name: Verify deploy artifacts exist
        run: |
          set -euo pipefail
          test -f "${DEPLOY_NOTEBOOK_DIR}/${EXPECTED_NOTEBOOK_FILE}" \
            || { echo "ERROR: notebook artifact missing" >&2; exit 1; }
          test -f "${DEPLOY_NOTEBOOK_DIR}/kernel-metadata.json" \
            || { echo "ERROR: kernel-metadata.json missing" >&2; exit 1; }
          test -f "${DEPLOY_RUNTIME_DIR}/dataset-metadata.json" \
            || { echo "ERROR: dataset-metadata.json missing" >&2; exit 1; }
          test -f "${DEPLOY_RUNTIME_DIR}/packaging/kaggle/frozen_artifacts_manifest.json" \
            || { echo "ERROR: frozen_artifacts_manifest.json missing" >&2; exit 1; }
          test -d "${DEPLOY_RUNTIME_DIR}/src/frozen_splits" \
            || { echo "ERROR: frozen_splits/ missing" >&2; exit 1; }

      - name: Validate metadata and capture outputs
        id: capture
        run: python scripts/cd/validate_kaggle_metadata.py preflight

      - name: Upload runtime artifact
        uses: actions/upload-artifact@v4
        with:
          name: kaggle-runtime
          path: ${{ env.DEPLOY_RUNTIME_DIR }}
          if-no-files-found: error
          retention-days: 7

      - name: Upload notebook artifact
        uses: actions/upload-artifact@v4
        with:
          name: kaggle-notebook
          path: ${{ env.DEPLOY_NOTEBOOK_DIR }}
          if-no-files-found: error
          retention-days: 7

      - name: Write preflight summary
        run: |
          set -euo pipefail
          {
            echo "## Kaggle preflight summary"
            echo ""
            echo "- Ref: \`${{ github.ref }}\`"
            echo "- Commit: \`${{ github.sha }}\`"
            echo "- Dataset target: \`${{ steps.capture.outputs.dataset_id }}\`"
            echo "- Notebook target: \`${{ steps.capture.outputs.kernel_id }}\`"
            echo "- Notebook file: \`${{ steps.capture.outputs.notebook_file }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

  publish-dataset:
    name: Publish Kaggle dataset
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: preflight-build
    environment: kaggle-prod
    env:
      KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}

    steps:
      - name: Checkout scripts
        uses: actions/checkout@v4
        with:
          sparse-checkout: scripts

      - name: Download runtime artifact
        uses: actions/download-artifact@v4
        with:
          name: kaggle-runtime
          path: ${{ env.DEPLOY_RUNTIME_DIR }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Kaggle CLI
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install "kaggle==${KAGGLE_CLI_VERSION}"

      - name: Kaggle auth smoke test
        run: |
          set -euo pipefail
          test -n "${KAGGLE_API_TOKEN}" || {
            echo "ERROR: KAGGLE_API_TOKEN secret is not set" >&2
            exit 1
          }
          python -c "
          from kaggle.api.kaggle_api_extended import KaggleApiExtended as KaggleApi
          api = KaggleApi()
          api.authenticate()
          print('Kaggle env-based auth OK')
          "

      - name: Verify dataset publish payload
        run: python scripts/cd/validate_kaggle_metadata.py dataset

      - name: Determine dataset publish mode
        id: dataset_mode
        env:
          DATASET_ID: ${{ needs.preflight-build.outputs.dataset_id }}
        run: bash scripts/cd/determine_dataset_publish_mode.sh

      - name: Create dataset
        if: steps.dataset_mode.outputs.mode == 'create'
        env:
          DATASET_ID: ${{ needs.preflight-build.outputs.dataset_id }}
        run: |
          set -euo pipefail
          echo "Creating dataset ${DATASET_ID}"
          kaggle datasets create -p "${DEPLOY_RUNTIME_DIR}" --dir-mode "${KAGGLE_DATASET_DIR_MODE}"

      - name: Version dataset
        if: steps.dataset_mode.outputs.mode == 'version'
        env:
          DATASET_ID: ${{ needs.preflight-build.outputs.dataset_id }}
          DATASET_VERSION_MESSAGE: ${{ inputs.dataset_version_message }}
        run: |
          set -euo pipefail
          VERSION_MSG="${DATASET_VERSION_MESSAGE:-Update from ${{ github.sha }}}"
          echo "Versioning dataset ${DATASET_ID}: ${VERSION_MSG}"
          kaggle datasets version -p "${DEPLOY_RUNTIME_DIR}" --dir-mode "${KAGGLE_DATASET_DIR_MODE}" -m "${VERSION_MSG}"

      - name: Validate remote dataset metadata
        env:
          DATASET_ID: ${{ needs.preflight-build.outputs.dataset_id }}
        run: bash scripts/cd/validate_remote_dataset.sh

      - name: Write dataset publish summary
        run: |
          set -euo pipefail
          {
            echo "## Dataset publish"
            echo ""
            echo "- Dataset: \`${{ needs.preflight-build.outputs.dataset_id }}\`"
            echo "- Mode: \`${{ steps.dataset_mode.outputs.mode }}\`"
            echo "- Dir mode: \`${{ env.KAGGLE_DATASET_DIR_MODE }}\`"
            echo "- Ref: \`${{ github.ref }}\`"
            echo "- Commit: \`${{ github.sha }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

  publish-notebook:
    name: Publish Kaggle notebook
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - preflight-build
      - publish-dataset
    environment: kaggle-prod
    env:
      KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}

    steps:
      - name: Checkout scripts
        uses: actions/checkout@v4
        with:
          sparse-checkout: scripts

      - name: Download notebook artifact
        uses: actions/download-artifact@v4
        with:
          name: kaggle-notebook
          path: ${{ env.DEPLOY_NOTEBOOK_DIR }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Kaggle CLI
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install "kaggle==${KAGGLE_CLI_VERSION}"

      - name: Kaggle auth smoke test
        run: |
          set -euo pipefail
          test -n "${KAGGLE_API_TOKEN}" || {
            echo "ERROR: KAGGLE_API_TOKEN secret is not set" >&2
            exit 1
          }
          python -c "
          from kaggle.api.kaggle_api_extended import KaggleApiExtended as KaggleApi
          api = KaggleApi()
          api.authenticate()
          print('Kaggle env-based auth OK')
          "

      - name: Verify notebook publish payload
        run: python scripts/cd/validate_kaggle_metadata.py notebook

      - name: Publish notebook to Kaggle
        env:
          KERNEL_ID: ${{ needs.preflight-build.outputs.kernel_id }}
        run: |
          set -euo pipefail
          echo "Pushing notebook ${KERNEL_ID}"
          kaggle kernels push -p "${DEPLOY_NOTEBOOK_DIR}"

      - name: Validate remote notebook metadata
        env:
          KERNEL_ID: ${{ needs.preflight-build.outputs.kernel_id }}
          DATASET_ID: ${{ needs.preflight-build.outputs.dataset_id }}
        run: python scripts/cd/validate_remote_kernel.py

      - name: Write notebook publish summary
        run: |
          set -euo pipefail
          {
            echo "## Notebook publish"
            echo ""
            echo "- Notebook: \`${{ needs.preflight-build.outputs.kernel_id }}\`"
            echo "- Notebook file: \`${{ needs.preflight-build.outputs.notebook_file }}\`"
            echo "- Runtime dataset: \`${{ needs.preflight-build.outputs.dataset_id }}\`"
            echo "- Triggered by: \`${{ github.actor }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
