name: Deploy - Kaggle Notebook

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-kaggle-notebook
  cancel-in-progress: false

env:
  KAGGLE_CLI_VERSION: "2.0.0"
  BUNDLE_DIR: /tmp/ruleshift-kernel-bundle

jobs:
  deploy:
    name: Deploy notebook
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955

      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .
          pip install "kaggle==${KAGGLE_CLI_VERSION}"

      - name: Build kernel bundle
        run: |
          python scripts/build_kernel_package.py \
            --output-dir "$BUNDLE_DIR"

      - name: Validate kernel bundle
        run: python -m pytest tests/test_cd_build.py tests/test_packaging.py tests/test_kbench_notebook.py -v

      - name: Publish notebook
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          set -euo pipefail
          kaggle --version
          kaggle kernels push \
            --path "$BUNDLE_DIR"
