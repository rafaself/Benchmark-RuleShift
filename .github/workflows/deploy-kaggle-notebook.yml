name: Deploy — Kaggle Notebook

on:
  workflow_dispatch:
    inputs:
      kernel_id:
        description: >
          Kaggle kernel id (owner/slug). Must match the canonical id baked into
          the build script. Providing a different value aborts the job before
          any push occurs.
        required: true
        default: "raptorengineer/ruleshift-notebook-task"
      kernel_title:
        description: "Human-readable kernel title written into kernel-metadata.json"
        required: true
        default: "RuleShift Notebook Task — Cognitive Flexibility Benchmark"
      runtime_dataset_slug:
        description: >
          Kaggle dataset slug for the runtime package injected into
          kernel-metadata.json as dataset_sources. Must reference an already
          published dataset. Does not modify notebook content.
        required: true
        default: "raptorengineer/ruleshift-runtime"

  # Called by the orchestrator workflow.
  workflow_call:
    inputs:
      kernel_id:
        description: "Kaggle kernel id (owner/slug)"
        required: true
        type: string
      kernel_title:
        description: "Human-readable kernel title"
        required: true
        type: string
      runtime_dataset_slug:
        description: "Kaggle dataset slug injected into kernel-metadata.json as dataset_sources"
        required: true
        type: string
    secrets:
      KAGGLE_API_TOKEN:
        required: true

concurrency:
  group: deploy-kaggle-notebook
  cancel-in-progress: false

env:
  KAGGLE_CLI_VERSION: "1.8.4"
  BUNDLE_DIR: /tmp/ruleshift-kernel-bundle
  # Canonical kernel slug baked into build_kernel_package.py.
  # The input is validated against this value before any push.
  CANONICAL_KERNEL_ID: "raptorengineer/ruleshift-notebook-task"
  # Canonical runtime dataset slug referenced by kernel-metadata.json.
  # The input is validated against this value so the notebook always
  # references the correct, already-deployed runtime package.
  CANONICAL_RUNTIME_DATASET_SLUG: "raptorengineer/ruleshift-runtime"

jobs:
  # ── Job 1: validate ──────────────────────────────────────────────────────────
  # Runs the same gates as CI so a deploy from an unmerged branch cannot
  # bypass them.  Notebook smoke tests are included because the notebook
  # is the artifact being deployed.
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Install project (editable, no optional provider SDKs)
        run: pip install -e .

      - name: Install notebook smoke-test dependencies
        run: pip install "pandas>=2.0,<3.0"

      - name: Enforce private split isolation
        run: python scripts/check_public_private_isolation.py

      - name: Run packaging tests
        run: python -m pytest tests/test_packaging.py -v

      - name: Run CD build validation tests
        run: python -m pytest tests/test_cd_build.py -v

      - name: Run notebook smoke tests
        run: python -m pytest tests/test_kbench_notebook.py -v

  # ── Job 2: deploy ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy notebook
    runs-on: ubuntu-latest
    needs: validate
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project (editable, no optional provider SDKs)
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Install Kaggle CLI (pinned)
        run: pip install "kaggle==${{ env.KAGGLE_CLI_VERSION }}"

      # ── Guards ────────────────────────────────────────────────────────────────
      # Both guards run before the build so no artifacts are produced when
      # an input would cause a push to the wrong kernel or reference a wrong
      # dataset slug.

      - name: Verify kernel_id matches canonical value
        run: |
          if [ "${{ inputs.kernel_id }}" != "${{ env.CANONICAL_KERNEL_ID }}" ]; then
            echo "ERROR: kernel_id '${{ inputs.kernel_id }}' does not match" \
                 "canonical id '${{ env.CANONICAL_KERNEL_ID }}'."
            echo "The kernel id must remain stable across releases."
            echo "To publish under a new slug, update CANONICAL_KERNEL_ID in the workflow"
            echo "and _KERNEL_ID in scripts/cd/build_kernel_package.py in the same commit."
            exit 1
          fi

      - name: Verify runtime_dataset_slug matches canonical value
        run: |
          if [ "${{ inputs.runtime_dataset_slug }}" != "${{ env.CANONICAL_RUNTIME_DATASET_SLUG }}" ]; then
            echo "ERROR: runtime_dataset_slug '${{ inputs.runtime_dataset_slug }}' does not match" \
                 "canonical slug '${{ env.CANONICAL_RUNTIME_DATASET_SLUG }}'."
            echo "The runtime dataset slug must reference the published runtime package."
            echo "To point to a different dataset, update CANONICAL_RUNTIME_DATASET_SLUG in"
            echo "the workflow and the matching default in kernel-metadata.json in the same commit."
            exit 1
          fi

      # ── Build ─────────────────────────────────────────────────────────────────
      # The build script copies the notebook verbatim and generates
      # kernel-metadata.json with dataset_sources set to runtime_dataset_slug.
      - name: Build kernel bundle
        run: |
          python scripts/cd/build_kernel_package.py \
            --runtime-dataset-slug "${{ inputs.runtime_dataset_slug }}" \
            --output-dir "${{ env.BUNDLE_DIR }}"

      # Patch only the title field. The id and all other fields are owned by
      # the build script and must not be changed here.
      - name: Patch kernel-metadata.json title
        env:
          KERNEL_TITLE: ${{ inputs.kernel_title }}
        run: |
          python - <<'EOF'
          import json, os
          from pathlib import Path

          meta_path = Path("${{ env.BUNDLE_DIR }}") / "kernel-metadata.json"
          meta = json.loads(meta_path.read_text(encoding="utf-8"))
          meta["title"] = os.environ["KERNEL_TITLE"]
          meta_path.write_text(json.dumps(meta, indent=2) + "\n", encoding="utf-8")
          print(f"kernel-metadata.json: id={meta['id']!r}  title={meta['title']!r}")
          print(f"  dataset_sources={meta['dataset_sources']!r}")
          EOF

      # ── Push ──────────────────────────────────────────────────────────────────
      # `kaggle kernels push` is always an upsert: it creates the kernel on
      # first push and updates it on subsequent pushes.  The id field in
      # kernel-metadata.json determines which kernel is targeted.
      - name: Configure Kaggle credentials
        env:
          KAGGLE_USERNAME: ${{ vars.KAGGLE_USERNAME }}
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          set +x
          mkdir -p ~/.kaggle
          cat > ~/.kaggle/kaggle.json <<EOF
          {"username":"${KAGGLE_USERNAME}","key":"${KAGGLE_API_TOKEN}"}
          EOF
          chmod 600 ~/.kaggle/kaggle.json

      - name: Push kernel bundle
        run: |
          kaggle kernels push \
            --path "${{ env.BUNDLE_DIR }}"

      - name: Revoke Kaggle credentials
        if: always()
        run: rm -f ~/.kaggle/kaggle.json
