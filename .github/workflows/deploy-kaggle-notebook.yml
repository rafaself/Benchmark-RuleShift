name: Deploy — Kaggle Notebook

on:
  workflow_dispatch:
    inputs:
      kernel_id:
        description: >
          Kaggle kernel id (owner/slug). Must match the canonical id baked into
          the build script. Providing a different value aborts the job before
          any push occurs.
        required: true
        default: "KAGGLE_USERNAME/ruleshift-notebook-task"
      kernel_title:
        description: "Human-readable kernel title written into kernel-metadata.json"
        required: true
        default: "RuleShift Notebook Task — Cognitive Flexibility Benchmark"
      runtime_dataset_slug:
        description: >
          Kaggle dataset slug for the runtime package injected into
          kernel-metadata.json as dataset_sources. Must reference an already
          published dataset. Does not modify notebook content.
        required: true
        default: "KAGGLE_USERNAME/ruleshift-runtime"

  # Called by the orchestrator workflow.
  workflow_call:
    inputs:
      kernel_id:
        description: "Kaggle kernel id (owner/slug)"
        required: true
        type: string
      kernel_title:
        description: "Human-readable kernel title"
        required: true
        type: string
      runtime_dataset_slug:
        description: "Kaggle dataset slug injected into kernel-metadata.json as dataset_sources"
        required: true
        type: string
    secrets:
      KAGGLE_API_TOKEN:
        required: true

concurrency:
  group: deploy-kaggle-notebook
  cancel-in-progress: false

env:
  KAGGLE_CLI_VERSION: "2.0.0"
  BUNDLE_DIR: /tmp/ruleshift-kernel-bundle
  # Canonical kernel slug baked into build_kernel_package.py.
  # The input is validated against this value before any push.
  CANONICAL_KERNEL_ID: "${{ vars.KAGGLE_USERNAME }}/ruleshift-notebook-task"
  # Canonical runtime dataset slug referenced by kernel-metadata.json.
  # The input is validated against this value so the notebook always
  # references the correct, already-deployed runtime package.
  CANONICAL_RUNTIME_DATASET_SLUG: "${{ vars.KAGGLE_USERNAME }}/ruleshift-runtime"

jobs:
  # ── Job 1: validate ──────────────────────────────────────────────────────────
  # Runs the same gates as CI so a deploy from an unmerged branch cannot
  # bypass them.  Notebook smoke tests are included because the notebook
  # is the artifact being deployed.
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Install project (editable, no optional provider SDKs)
        run: pip install -e .

      - name: Install notebook smoke-test dependencies
        run: pip install "pandas>=2.0,<3.0"

      - name: Enforce private split isolation
        run: python scripts/check_public_private_isolation.py

      - name: Run packaging tests
        run: python -m pytest tests/test_packaging.py -v

      - name: Run CD build validation tests
        run: python -m pytest tests/test_cd_build.py -v

      - name: Run notebook smoke tests
        run: python -m pytest tests/test_kbench_notebook.py -v

  # ── Job 2: deploy ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy notebook
    runs-on: ubuntu-latest
    needs: validate
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project (editable, no optional provider SDKs)
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Install Kaggle CLI (pinned)
        run: pip install "kaggle==${KAGGLE_CLI_VERSION}"

      # ── Guards ────────────────────────────────────────────────────────────────
      # Both guards run before the build so no artifacts are produced when
      # an input would cause a push to the wrong kernel or reference a wrong
      # dataset slug.

      - name: Verify kernel_id matches canonical value
        env:
          KERNEL_ID: ${{ inputs.kernel_id }}
        run: |
          if [ "$KERNEL_ID" != "$CANONICAL_KERNEL_ID" ]; then
            echo "ERROR: kernel_id does not match canonical id."
            exit 1
          fi

      - name: Verify runtime_dataset_slug matches canonical value
        env:
          RUNTIME_DATASET_SLUG: ${{ inputs.runtime_dataset_slug }}
        run: |
          if [ "$RUNTIME_DATASET_SLUG" != "$CANONICAL_RUNTIME_DATASET_SLUG" ]; then
            echo "ERROR: runtime_dataset_slug does not match canonical slug."
            exit 1
          fi

      # ── Build ─────────────────────────────────────────────────────────────────
      # The build script copies the notebook verbatim and generates
      # kernel-metadata.json with dataset_sources set to runtime_dataset_slug.
      - name: Build kernel bundle
        env:
          RUNTIME_DATASET_SLUG: ${{ inputs.runtime_dataset_slug }}
        run: |
          python scripts/cd/build_kernel_package.py \
            --runtime-dataset-slug "$RUNTIME_DATASET_SLUG" \
            --output-dir "$BUNDLE_DIR"

      # Patch only the title field. The id and all other fields are owned by
      # the build script and must not be changed here.
      - name: Patch kernel-metadata.json title
        env:
          KERNEL_TITLE: ${{ inputs.kernel_title }}
        run: |
          python - <<'EOF'
          import json, os
          from pathlib import Path

          meta_path = Path(os.environ["BUNDLE_DIR"]) / "kernel-metadata.json"
          meta = json.loads(meta_path.read_text(encoding="utf-8"))
          meta["title"] = os.environ["KERNEL_TITLE"]
          meta_path.write_text(json.dumps(meta, indent=2) + "\n", encoding="utf-8")
          EOF

      # ── Push ──────────────────────────────────────────────────────────────────
      # Authenticate with the recommended API token flow. The Kaggle CLI
      # accepts KAGGLE_API_TOKEN directly, so CI does not need kaggle.json.
      - name: Verify Kaggle CLI installation and authentication
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          set -euo pipefail

          output_file="$(mktemp)"
          trap 'rm -f "$output_file"' EXIT

          kaggle --version

          if kaggle kernels list -m --page-size 1 >"$output_file" 2>&1; then
            echo "Kaggle CLI authentication preflight passed."
            exit 0
          fi

          output="$(cat "$output_file")"
          echo "ERROR: Kaggle CLI authentication preflight failed."
          if printf '%s' "$output" | grep -Eqi '401|403|unauth|forbidden|auth|login|token|credential|permission|access denied'; then
            echo "KAGGLE_API_TOKEN was rejected or lacks the required permissions."
          else
            echo "The Kaggle CLI could not complete an authenticated request."
          fi
          printf '%s\n' "$output"
          exit 1

      - name: Push kernel bundle
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          kaggle kernels push \
            --path "$BUNDLE_DIR"
