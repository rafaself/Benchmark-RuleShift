name: Deploy — Kaggle

# Single entry point for Kaggle deployments.  All build, validation, and
# publish logic lives in the dedicated reusable workflows called below:
#
#   dataset  → .github/workflows/deploy-kaggle-dataset.yml
#   notebook → .github/workflows/deploy-kaggle-notebook.yml
#
# Those workflows can also be triggered independently at any time.

on:
  workflow_dispatch:
    inputs:
      target:
        description: "What to deploy"
        required: true
        type: choice
        options:
          - dataset
          - notebook
          - all
      release_message:
        description: "Version note for dataset uploads (required when target = dataset or all)"
        required: true

concurrency:
  group: deploy-kaggle
  cancel-in-progress: false

jobs:
  # ── Dataset deployment ────────────────────────────────────────────────────────
  # Skipped (result=skipped) when target=notebook.
  deploy-dataset:
    name: Dataset
    if: inputs.target == 'dataset' || inputs.target == 'all'
    uses: ./.github/workflows/deploy-kaggle-dataset.yml
    with:
      release_message: ${{ inputs.release_message }}
    secrets:
      KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}

  # ── Notebook deployment ───────────────────────────────────────────────────────
  # needs: [deploy-dataset] is declared in all cases to enforce ordering when
  # target=all.  However, GitHub applies an implicit success() gate on needs
  # dependencies: when deploy-dataset is skipped (target=notebook), that gate
  # would silently skip this job too.
  #
  # The if: condition is therefore expanded with always() to suppress the
  # implicit gate, plus an explicit check that deploy-dataset either succeeded
  # (target=all, happy path) or was skipped (target=notebook).  A failed
  # deploy-dataset still blocks this job because 'failure' satisfies neither
  # branch of the OR.
  deploy-notebook:
    name: Notebook
    if: |
      always() &&
      (inputs.target == 'notebook' || inputs.target == 'all') &&
      (needs.deploy-dataset.result == 'success' || needs.deploy-dataset.result == 'skipped')
    needs: [deploy-dataset]
    uses: ./.github/workflows/deploy-kaggle-notebook.yml
    secrets:
      KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
